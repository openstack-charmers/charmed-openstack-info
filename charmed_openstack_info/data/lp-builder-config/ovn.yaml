# OVN Charms
defaults:
  team: ubuntu-ovn-eng

projects:
  - name: OVN Central
    charmhub: ovn-central
    launchpad: charm-ovn-central
    repository: ~ubuntu-ovn-eng/ovn-charms-v1/+git/ovn-charms-v1
    branches:
      main:
        build-channels:
          charmcraft: "3.x/stable"
        build-path: ovn-central
        channels:
          - latest/edge
        bases:
          - "22.04"
          - "24.04"
      stable/22.03:
